name: Automated OSINT Daily Update

on:
  schedule:
    # Run once daily at 8 AM UTC (09:00 local time)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Metadata Automation
        env:
          FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          FOUNDRY_MODEL: ${{ secrets.FOUNDRY_MODEL }}
        run: npx tsx scripts/automate-daily-metadata.ts

      - name: Run Advanced Firecrawl Scrapers
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          FOUNDRY_MODEL: ${{ secrets.FOUNDRY_MODEL }}
        run: |
          npx tsx scripts/update-kpis.ts
          npx tsx scripts/update-countries.ts
          npx tsx scripts/advanced-scrape.ts

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily dashboard metadata update [skip ci]"
          branch: main
