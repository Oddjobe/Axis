name: Automated OSINT Intelligence Scraper

on:
  schedule:
    # Run once daily at 5 AM UTC to stay within the 3,000 Firecrawl credit/month limit
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

jobs:
  scrape-and-insert:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Firecrawl-Free OSINT Scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/fast-scrape.ts
